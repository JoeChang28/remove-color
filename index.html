<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoryWed Color Magic | 質感影像去背</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Serif+TC:wght@300;400;600&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/upng-js@2.1.0/UPNG.min.js"></script>
    <style>
        :root {
            --primary-color: #C1A68D; 
            --primary-hover: #A88F78;
            --secondary-color: #8C7B70;
            --bg-page: #FDFCFB;
            --bg-panel: #FFFFFF;
            --border-light: #F0EBE6;
            --text-main: #4A4238;
            --text-muted: #9E9389;
            --shadow-elegant: 0 12px 35px rgba(168, 143, 120, 0.08);
            --border-radius: 16px;
        }

        body {
            font-family: 'Lato', 'Noto Serif TC', serif;
            background-color: var(--bg-page);
            background-image: radial-gradient(circle at 50% 0%, #ffffff 0%, #f7f5f2 100%);
            color: var(--text-main);
            margin: 0;
            padding: 50px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--bg-panel);
            padding: 45px 50px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-elegant);
            max-width: 1300px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(193, 166, 141, 0.2);
            transition: all 0.3s ease;
        }
        .container.dragover {
            border-color: var(--primary-color);
            background-color: #FAF8F5;
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(168, 143, 120, 0.15);
        }

        .header-section { margin-bottom: 35px; }

        h1 {
            font-family: 'Cormorant Garamond', 'Noto Serif TC', serif;
            font-weight: 600;
            font-size: 2.2rem;
            color: var(--primary-hover);
            margin: 0 0 10px 0;
            letter-spacing: 3px;
        }
        h1 span { font-style: italic; font-weight: 400; }

        p.subtitle {
            font-family: 'Lato', 'Noto Serif TC', sans-serif;
            font-size: 0.95rem;
            color: var(--text-muted);
            margin: 0;
            letter-spacing: 1.5px;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
            padding: 18px 25px;
            background: #FCFBF9;
            border-radius: 50px;
            border: 1px solid var(--border-light);
        }

        .tool-group {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 18px;
            border-right: 1px solid #EBE5DF;
        }
        .tool-group:last-child { border-right: none; padding-right: 0; }

        button, .btn-upload {
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid #DCD5CD;
            padding: 8px 18px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: 'Lato', 'Noto Serif TC', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        button:hover:not(:disabled), .btn-upload:hover {
            border-color: var(--primary-color);
            color: var(--primary-hover);
            background-color: #FAF8F5;
        }
        button.active {
            background-color: var(--primary-color);
            color: #fff;
            border-color: var(--primary-color);
            box-shadow: 0 4px 10px rgba(193, 166, 141, 0.3);
        }
        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            border-color: #EBE5DF;
            background-color: transparent;
            color: var(--text-muted);
        }

        .btn-bg {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            padding: 0;
            border: 1px solid #DCD5CD;
            display: inline-block;
            transition: transform 0.2s;
        }
        .btn-bg:hover { transform: scale(1.1); }
        .btn-bg.active {
            border: 2px solid var(--primary-color);
            box-shadow: 0 0 8px rgba(193, 166, 141, 0.4);
        }

        input[type="file"] { display: none; }
        input[type="text"] {
            padding: 7px 12px;
            border: 1px solid #DCD5CD;
            border-radius: 20px;
            width: 75px;
            font-family: monospace;
            text-align: center;
            color: var(--text-main);
            outline: none;
            background: transparent;
            font-size: 0.85rem;
        }
        input[type="text"]:focus { border-color: var(--primary-color); }
        input[type="range"] {
            accent-color: var(--primary-color);
            cursor: pointer;
            width: 75px;
            height: 4px;
            background: #EBE5DF;
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: var(--primary-color);
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.1s;
        }
        input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }
        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            padding: 0;
            overflow: hidden;
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 1px solid #DCD5CD; border-radius: 50%; }

        /* 下載按鈕專屬樣式 */
        .btn-download {
            background-color: var(--text-main);
            color: #fff;
            border-color: var(--text-main);
        }
        .btn-download:hover:not(:disabled) {
            background-color: #332D26;
            color: #fff;
            border-color: #332D26;
        }
        .btn-compress {
            background-color: var(--secondary-color);
            color: #fff;
            border-color: var(--secondary-color);
        }
        .btn-compress:hover:not(:disabled) {
            background-color: #7A695E;
            color: #fff;
            border-color: #7A695E;
        }

        .canvas-wrapper {
            position: relative;
            display: inline-block;
            max-width: 100%;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.03);
            min-height: 400px;
            cursor: crosshair;
            transition: background 0.3s ease;
            user-select: none; 
            border: 1px solid var(--border-light);
        }
        .bg-transparent {
            background-image: 
                linear-gradient(45deg, #F4F1EE 25%, transparent 25%), 
                linear-gradient(-45deg, #F4F1EE 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #F4F1EE 75%), 
                linear-gradient(-45deg, transparent 75%, #F4F1EE 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            background-color: #FFFFFF;
        }
        .bg-solid { background-image: none; }
        canvas { display: block; max-width: 100%; height: auto; }

        #brushCursor {
            position: absolute;
            border: 1.5px solid #ffffff;
            background-color: rgba(193, 166, 141, 0.4);
            border-radius: 50%;
            pointer-events: none;
            display: none;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 5px rgba(0,0,0,0.2);
            z-index: 10;
        }
        #brushCursor.mode-restore { background-color: rgba(163, 184, 153, 0.4); }
        #selectionBox {
            position: absolute;
            border: 1.5px dashed var(--primary-color);
            background-color: rgba(193, 166, 141, 0.1);
            pointer-events: none;
            display: none;
            z-index: 20;
        }
        #selectionBox.mode-restore { border-color: #a3b899; background-color: rgba(163, 184, 153, 0.1); }
        #empty-state {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--text-muted);
            pointer-events: none;
            font-weight: 300;
            letter-spacing: 2px;
        }
        .mode-hint {
            margin-top: 20px;
            font-size: 0.85rem;
            color: var(--text-muted);
            letter-spacing: 1px;
            font-style: italic;
        }
        label { font-size: 0.85rem; color: var(--text-muted); letter-spacing: 1px; }
        span[id$="Value"] { display: inline-block; width: 20px; text-align: right; color: var(--text-main); }
    </style>
</head>
<body>

<div class="container" id="dropZone">
    <div class="header-section">
        <h1>StoryWed <span>Color Magic</span></h1>
        <p class="subtitle">精品級影像去背與修復工具</p>
    </div>

    <div class="toolbar">
        <div class="tool-group">
            <label for="imageLoader" class="btn-upload" title="上傳圖片">📁 選擇圖片</label>
            <input type="file" id="imageLoader" accept="image/*">
        </div>

        <div class="tool-group">
            <button id="btnPicker" class="active" title="點選去除色彩">🪄 吸管</button>
            <input type="text" id="hexInput" placeholder="#FFFFFF">
            <label>容差 <span id="toleranceValue">30</span></label>
            <input type="range" id="tolerance" min="0" max="150" value="30">
        </div>

        <div class="tool-group">
            <button id="btnEraser" title="用筆刷手動擦除邊緣">🧽 筆刷</button>
            <button id="btnRectEraser" title="框選大面積進行擦除">🔲 範圍</button>
            <button id="btnRestore" title="用筆刷手動恢復原圖">✨ 還原(筆)</button>
            <button id="btnRectRestore" title="框選大面積恢復原圖">🟩 還原(框)</button>
            <label>直徑 <span id="brushSizeValue">20</span></label>
            <input type="range" id="brushSize" min="5" max="150" value="20">
        </div>

        <div class="tool-group">
            <label>底色:</label>
            <button class="btn-bg active" data-bg="transparent" style="background: url('data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'20\' height=\'20\'><rect width=\'10\' height=\'10\' fill=\'%23F4F1EE\'/><rect x=\'10\' y=\'10\' width=\'10\' height=\'10\' fill=\'%23F4F1EE\'/></svg>') repeat;" title="透明背景"></button>
            <button class="btn-bg" data-bg="#1A1816" style="background-color: #1A1816;" title="深色背景"></button>
            <button class="btn-bg" data-bg="#FFFFFF" style="background-color: #FFFFFF;" title="淺色背景"></button>
            <input type="color" id="customBgColor" value="#C1A68D" title="自訂預覽顏色">
        </div>

        <div class="tool-group">
            <button id="btnUndo" disabled title="復原 (Undo)">↩️</button>
            <button id="btnRedo" disabled title="重做 (Redo)">↪️</button>
        </div>

        <div class="tool-group">
            <button id="btnDownload" class="btn-download" disabled title="由瀏覽器快速匯出原檔 PNG">📥 原檔 PNG</button>
            <button id="btnCompressDownload" class="btn-compress" disabled title="保持 100% 畫質與尺寸，進行底層無損深度壓縮">🗜️ 無損深度壓縮 PNG</button>
        </div>
    </div>

    <div class="canvas-wrapper bg-transparent" id="canvasWrapper">
        <div id="empty-state">請點擊上方按鈕或將圖片拖曳至此處</div>
        <div id="brushCursor"></div>
        <div id="selectionBox"></div>
        <canvas id="canvas"></canvas>
    </div>
    <div class="mode-hint" id="modeHint">
        目前模式：吸管點選（請在圖片上點擊欲去除的顏色，並可隨時拉動容差滑桿調整）
    </div>
</div>

<script>
    const dropZone = document.getElementById('dropZone');
    const imageLoader = document.getElementById('imageLoader');
    const canvasWrapper = document.getElementById('canvasWrapper');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    
    const brushCursor = document.getElementById('brushCursor');
    const selectionBox = document.getElementById('selectionBox');
    const btnPicker = document.getElementById('btnPicker');
    const btnEraser = document.getElementById('btnEraser');
    const btnRectEraser = document.getElementById('btnRectEraser');
    const btnRestore = document.getElementById('btnRestore');
    const btnRectRestore = document.getElementById('btnRectRestore');
    const hexInput = document.getElementById('hexInput');
    const toleranceSlider = document.getElementById('tolerance');
    const brushSizeSlider = document.getElementById('brushSize');
    const btnUndo = document.getElementById('btnUndo');
    const btnRedo = document.getElementById('btnRedo');
    const btnDownload = document.getElementById('btnDownload');
    const btnCompressDownload = document.getElementById('btnCompressDownload'); 
    const modeHint = document.getElementById('modeHint');
    const bgButtons = document.querySelectorAll('.btn-bg');
    const customBgColor = document.getElementById('customBgColor');

    let currentMode = 'picker';
    let isDrawing = false;
    let isDraggingRect = false;
    let lastPos = { x: 0, y: 0, cssX: 0, cssY: 0 };
    let currentRectEndPos = { x: 0, y: 0 }; 
    let historyStack = [];
    let redoStack = []; 
    let activeBaseData = null; 

    const originalCanvas = document.createElement('canvas');
    const originalCtx = originalCanvas.getContext('2d');

    // 背景預覽
    function setPreviewBackground(color, isTransparent) {
        bgButtons.forEach(btn => btn.classList.remove('active'));
        if (isTransparent) {
            canvasWrapper.className = 'canvas-wrapper bg-transparent';
            canvasWrapper.style.backgroundColor = '';
        } else {
            canvasWrapper.className = 'canvas-wrapper bg-solid';
            canvasWrapper.style.backgroundColor = color;
        }
    }

    bgButtons.forEach(btn => {
        btn.addEventListener('click', function() {
            this.classList.add('active');
            if (this.getAttribute('data-bg') === 'transparent') setPreviewBackground('', true);
            else setPreviewBackground(this.getAttribute('data-bg'), false);
        });
    });
    customBgColor.addEventListener('input', e => setPreviewBackground(e.target.value, false));

    // 圖片載入
    function loadImage(file) {
        if (!file || !file.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                document.getElementById('empty-state').style.display = 'none';
                
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                
                originalCanvas.width = img.width;
                originalCanvas.height = img.height;
                originalCtx.drawImage(img, 0, 0);
                
                historyStack = [];
                redoStack = [];
                updateUndoRedoButtons();
                
                btnDownload.disabled = false;
                btnCompressDownload.disabled = false;
                setMode('picker');
            }
            img.src = event.target.result;
        }
        reader.readAsDataURL(file);
    }

    imageLoader.addEventListener('change', (e) => loadImage(e.target.files[0]));
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); });
    dropZone.addEventListener('drop', (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); loadImage(e.dataTransfer.files[0]); });

    function updateUndoRedoButtons() {
        btnUndo.disabled = historyStack.length === 0;
        btnRedo.disabled = redoStack.length === 0;
    }

    function saveStateToHistory() {
        if (canvas.width === 0) return;
        const currentData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        historyStack.push(currentData);
        if (historyStack.length > 20) historyStack.shift();
        redoStack = []; 
        updateUndoRedoButtons();
    }

    btnUndo.addEventListener('click', () => {
        if (historyStack.length > 0) {
            redoStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
            const previousState = historyStack.pop();
            ctx.putImageData(previousState, 0, 0);
            activeBaseData = previousState; 
            updateUndoRedoButtons();
        }
    });

    btnRedo.addEventListener('click', () => {
        if (redoStack.length > 0) {
            historyStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
            const nextState = redoStack.pop();
            ctx.putImageData(nextState, 0, 0);
            activeBaseData = nextState; 
            updateUndoRedoButtons();
        }
    });

    function setMode(mode) {
        currentMode = mode;
        [btnPicker, btnEraser, btnRectEraser, btnRestore, btnRectRestore].forEach(btn => btn.classList.remove('active'));
        brushCursor.style.display = 'none';
        selectionBox.style.display = 'none';
        
        if (mode === 'picker') {
            btnPicker.classList.add('active');
            canvasWrapper.style.cursor = 'crosshair';
            modeHint.textContent = '目前模式：吸管點選（點擊欲去除的顏色，並可隨時拉動容差滑桿調整）';
        } else if (mode === 'eraser') {
            btnEraser.classList.add('active');
            canvasWrapper.style.cursor = 'none';
            brushCursor.classList.remove('mode-restore');
            modeHint.textContent = '目前模式：筆刷抹除（按住左鍵塗抹，可手動精細擦除邊緣）';
        } else if (mode === 'rect-eraser') {
            btnRectEraser.classList.add('active');
            canvasWrapper.style.cursor = 'crosshair';
            selectionBox.classList.remove('mode-restore');
            modeHint.textContent = '目前模式：範圍抹除（按住左鍵拉出矩形，放開後抹除該區域）';
        } else if (mode === 'restore') {
            btnRestore.classList.add('active');
            canvasWrapper.style.cursor = 'none';
            brushCursor.classList.add('mode-restore');
            modeHint.textContent = '目前模式：筆刷還原（按住左鍵塗抹，將去背區域恢復為原圖）';
        } else if (mode === 'rect-restore') {
            btnRectRestore.classList.add('active');
            canvasWrapper.style.cursor = 'crosshair';
            selectionBox.classList.add('mode-restore');
            modeHint.textContent = '目前模式：範圍還原（按住左鍵拉出矩形，放開後恢復該區域原圖）';
        }
    }

    btnPicker.addEventListener('click', () => setMode('picker'));
    btnEraser.addEventListener('click', () => setMode('eraser'));
    btnRectEraser.addEventListener('click', () => setMode('rect-eraser'));
    btnRestore.addEventListener('click', () => setMode('restore'));
    btnRectRestore.addEventListener('click', () => setMode('rect-restore'));

    function hexToRgb(hex) {
        const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return result ? [parseInt(result[1], 16), parseInt(result[2], 16), parseInt(result[3], 16)] : null;
    }

    function removeColor(targetColor, tolerance, sourceData) {
        if (!sourceData) return;
        const currentImageData = new ImageData(new Uint8ClampedArray(sourceData.data), canvas.width, canvas.height);
        const data = currentImageData.data;

        for (let i = 0; i < data.length; i += 4) {
            if(data[i+3] === 0) continue; 
            const distance = Math.sqrt(Math.pow(data[i] - targetColor[0], 2) + Math.pow(data[i+1] - targetColor[1], 2) + Math.pow(data[i+2] - targetColor[2], 2));
            if (distance <= tolerance) data[i + 3] = 0;
        }
        ctx.putImageData(currentImageData, 0, 0);
    }

    toleranceSlider.addEventListener('input', (e) => {
        document.getElementById('toleranceValue').textContent = e.target.value;
        if (currentMode === 'picker' && activeBaseData) {
            const rgb = hexToRgb(hexInput.value);
            if (rgb) removeColor(rgb, parseInt(e.target.value), activeBaseData);
        }
    });

    hexInput.addEventListener('change', (e) => {
        let hex = e.target.value.trim();
        if(!hex.startsWith('#')) hex = '#' + hex;
        const rgb = hexToRgb(hex);
        if (rgb) {
            setMode('picker');
            saveStateToHistory(); 
            activeBaseData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            removeColor(rgb, parseInt(toleranceSlider.value), activeBaseData);
        }
    });

    function getMousePos(e) {
        const rect = canvas.getBoundingClientRect();
        return {
            x: (e.clientX - rect.left) * (canvas.width / rect.width),
            y: (e.clientY - rect.top) * (canvas.height / rect.height),
            cssX: e.clientX - rect.left,
            cssY: e.clientY - rect.top
        };
    }

    canvasWrapper.addEventListener('mousedown', function(e) {
        if (canvas.width === 0) return;
        const pos = getMousePos(e);

        if (currentMode === 'picker') {
            saveStateToHistory();
            activeBaseData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const pixelIndex = (Math.floor(pos.y) * canvas.width + Math.floor(pos.x)) * 4;
            const targetColor = [
                activeBaseData.data[pixelIndex], 
                activeBaseData.data[pixelIndex+1], 
                activeBaseData.data[pixelIndex+2]
            ];
            hexInput.value = "#" + targetColor.map(x => x.toString(16).padStart(2, '0')).join('').toUpperCase();
            removeColor(targetColor, parseInt(toleranceSlider.value), activeBaseData);
            
        } else if (currentMode.startsWith('rect-')) {
            isDraggingRect = true;
            lastPos = pos;
            currentRectEndPos = pos;
            selectionBox.style.display = 'block';
            selectionBox.style.left = pos.cssX + 'px';
            selectionBox.style.top = pos.cssY + 'px';
            selectionBox.style.width = '0px';
            selectionBox.style.height = '0px';
            saveStateToHistory();
            activeBaseData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        } else {
            saveStateToHistory();
            activeBaseData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            isDrawing = true;
            lastPos = pos;
            applyBrush(pos); 
        }
    });

    canvasWrapper.addEventListener('mousemove', function(e) {
        if (!e || canvas.width === 0) return;
        const rect = canvas.getBoundingClientRect();
        const pos = getMousePos(e);

        if ((currentMode === 'eraser' || currentMode === 'restore') && e.clientX >= rect.left && e.clientX <= rect.right && e.clientY >= rect.top && e.clientY <= rect.bottom) {
            brushCursor.style.display = 'block';
            const visualSize = parseInt(brushSizeSlider.value) * (rect.width / canvas.width);
            brushCursor.style.width = `${visualSize}px`;
            brushCursor.style.height = `${visualSize}px`;
            brushCursor.style.left = `${pos.cssX}px`;
            brushCursor.style.top = `${pos.cssY}px`;
        } else {
            brushCursor.style.display = 'none';
        }

        if (isDraggingRect && currentMode.startsWith('rect-')) {
            currentRectEndPos = pos;
            const left = Math.min(lastPos.cssX, pos.cssX);
            const top = Math.min(lastPos.cssY, pos.cssY);
            const width = Math.abs(pos.cssX - lastPos.cssX);
            const height = Math.abs(pos.cssY - lastPos.cssY);
            selectionBox.style.left = left + 'px';
            selectionBox.style.top = top + 'px';
            selectionBox.style.width = width + 'px';
            selectionBox.style.height = height + 'px';
            return; 
        }

        if (isDrawing) applyBrush(pos);
    });

    window.addEventListener('mouseup', function() {
        if (isDrawing) {
            isDrawing = false;
            ctx.globalCompositeOperation = 'source-over';
        }
        
        if (isDraggingRect && currentMode.startsWith('rect-')) {
            isDraggingRect = false;
            selectionBox.style.display = 'none'; 
            const canvasX = Math.min(lastPos.x, currentRectEndPos.x);
            const canvasY = Math.min(lastPos.y, currentRectEndPos.y);
            const canvasW = Math.abs(currentRectEndPos.x - lastPos.x);
            const canvasH = Math.abs(currentRectEndPos.y - lastPos.y);

            if (canvasW > 0 && canvasH > 0) {
                if (currentMode === 'rect-eraser') {
                    ctx.globalCompositeOperation = 'destination-out';
                    ctx.fillRect(canvasX, canvasY, canvasW, canvasH);
                } else if (currentMode === 'rect-restore') {
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.drawImage(originalCanvas, canvasX, canvasY, canvasW, canvasH, canvasX, canvasY, canvasW, canvasH);
                }
                ctx.globalCompositeOperation = 'source-over'; 
            }
        }
    });

    canvasWrapper.addEventListener('mouseleave', () => { brushCursor.style.display = 'none'; });
    brushSizeSlider.addEventListener('input', (e) => { document.getElementById('brushSizeValue').textContent = e.target.value; });

    function applyBrush(currPos) {
        const size = parseInt(brushSizeSlider.value);
        if (currentMode === 'eraser') {
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.moveTo(lastPos.x, lastPos.y);
            ctx.lineTo(currPos.x, currPos.y);
            ctx.lineWidth = size;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.stroke();
        } else if (currentMode === 'restore') {
            ctx.globalCompositeOperation = 'source-over';
            const dist = Math.hypot(currPos.x - lastPos.x, currPos.y - lastPos.y);
            const steps = Math.max(1, Math.ceil(dist / (size / 4))); 
            for(let i = 0; i <= steps; i++) {
                const t = i / steps;
                const x = lastPos.x + (currPos.x - lastPos.x) * t;
                const y = lastPos.y + (currPos.y - lastPos.y) * t;
                ctx.save();
                ctx.beginPath();
                ctx.arc(x, y, size / 2, 0, Math.PI * 2);
                ctx.clip(); 
                ctx.drawImage(originalCanvas, 0, 0); 
                ctx.restore();
            }
        }
        lastPos = currPos;
    }

    // ==========================================
    // 5. 下載與無損深度壓縮模組
    // ==========================================
    
    // 1. 一般原檔下載 (最快)
    btnDownload.addEventListener('click', () => {
        if (canvas.width === 0) return;
        const link = document.createElement('a');
        link.download = 'StoryWed_ColorMagic_Original.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    });

    // 2. 絕對無損壓縮 (維持 100% 畫質與原尺寸，優化檔案結構來縮小 MB 數)
    btnCompressDownload.addEventListener('click', () => {
        if (canvas.width === 0) return;
        
        // 防呆保護：鎖定按鈕並提示運算中
        const originalText = btnCompressDownload.innerHTML;
        btnCompressDownload.innerHTML = '⏳ 深度無損運算中...';
        btnCompressDownload.disabled = true;
        btnDownload.disabled = true;

        // 給予瀏覽器極短暫的重繪時間來顯示「運算中」的文字，再進行高強度運算
        setTimeout(() => {
            try {
                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                
                // 核心關鍵：將 cnum 參數設為 0
                // 這會關閉色彩破壞性量化，改為執行深度的 ZLIB / DEFLATE 資料結構優化
                // 保證顏色、漸層、解析度 100% 原汁原味
                const compressedPng = UPNG.encode([imgData.data.buffer], canvas.width, canvas.height, 0);
                
                const blob = new Blob([compressedPng], { type: 'image/png' });
                const url = URL.createObjectURL(blob);
                
                const link = document.createElement('a');
                link.download = 'StoryWed_ColorMagic_Lossless.png';
                link.href = url;
                link.click();
                
                URL.revokeObjectURL(url);
            } catch (error) {
                console.error("壓縮運算失敗:", error);
                alert("照片像素過於龐大，運算超過瀏覽器負荷。建議直接使用原檔下載。");
            } finally {
                // 恢復按鈕狀態
                btnCompressDownload.innerHTML = originalText;
                btnCompressDownload.disabled = false;
                btnDownload.disabled = false;
            }
        }, 50);
    });

</script>
