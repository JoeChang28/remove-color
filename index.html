<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>質感影像去背工具 - 專業修復版</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #d1bfae; 
            --primary-hover: #bda895;
            --secondary-color: #e8ded5;
            --bg-color: #fcfbf9;
            --text-color: #5c534f;
            --box-shadow: 0 8px 25px rgba(189, 168, 149, 0.15);
            --border-radius: 12px;
        }

        body {
            font-family: 'Noto Serif TC', serif;
            background-color: var(--bg-color);
            background-image: linear-gradient(120deg, #fdfbfb 0%, #ebedee 100%);
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: #ffffff;
            padding: 40px;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            max-width: 1050px;
            width: 100%;
            text-align: center;
            transition: all 0.3s ease;
            border: 2px dashed transparent;
        }
        .container.dragover {
            border-color: var(--primary-color);
            background-color: #fdfaf7;
            transform: scale(1.01);
        }

        h1 {
            font-weight: 600;
            color: #8c7b70;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        p.subtitle {
            font-size: 0.95rem;
            color: #a3968e;
            margin-bottom: 30px;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
            padding: 20px;
            background: #faf8f6;
            border-radius: var(--border-radius);
            border: 1px solid #f0ebe6;
        }

        .tool-group {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 15px;
            border-right: 1px solid #e0d8d0;
        }
        .tool-group:last-child {
            border-right: none;
        }

        button, .btn-upload {
            background-color: #fff;
            color: var(--text-color);
            border: 1px solid #d1bfae;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Noto Serif TC', serif;
            font-size: 0.9rem;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        button:hover, .btn-upload:hover {
            background-color: var(--secondary-color);
        }
        button.active {
            background-color: var(--primary-color);
            color: #fff;
            border-color: var(--primary-color);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background-color: #fff;
            color: var(--text-color);
        }

        /* 預覽背景按鈕 */
        .btn-bg {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            padding: 0;
            border: 2px solid #e0d8d0;
            display: inline-block;
        }
        .btn-bg.active {
            border-color: #8c7b70;
            box-shadow: 0 0 5px rgba(140, 123, 112, 0.5);
        }

        input[type="file"] { display: none; }
        
        input[type="text"] {
            padding: 8px 12px;
            border: 1px solid #d1bfae;
            border-radius: 20px;
            width: 80px;
            font-family: monospace;
            text-align: center;
            color: var(--text-color);
            outline: none;
        }

        input[type="range"] {
            accent-color: var(--primary-color);
            cursor: pointer;
            width: 80px;
        }

        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            padding: 0;
            overflow: hidden;
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 2px solid #e0d8d0; border-radius: 50%; }

        .btn-download {
            background-color: var(--primary-color);
            color: #fff;
            border: none;
        }
        .btn-download:hover {
            background-color: var(--primary-hover);
            color: #fff;
        }

        /* 畫布與游標區域 */
        .canvas-wrapper {
            position: relative;
            display: inline-block;
            max-width: 100%;
            overflow: hidden;
            border-radius: var(--border-radius);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
            min-height: 300px;
            cursor: crosshair;
            transition: background 0.3s ease;
        }

        .bg-transparent {
            background-image: 
                linear-gradient(45deg, #eee 25%, transparent 25%), 
                linear-gradient(-45deg, #eee 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #eee 75%), 
                linear-gradient(-45deg, transparent 75%, #eee 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            background-color: transparent;
        }

        .bg-solid { background-image: none; }

        canvas {
            display: block;
            max-width: 100%;
            height: auto;
        }

        #brushCursor {
            position: absolute;
            border: 1.5px solid #ffffff;
            background-color: rgba(209, 191, 174, 0.4);
            border-radius: 50%;
            pointer-events: none;
            display: none;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 4px rgba(0,0,0,0.3);
            z-index: 10;
        }
        #brushCursor.mode-restore {
            background-color: rgba(163, 184, 153, 0.4);
        }

        #empty-state {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #a3968e;
            pointer-events: none;
        }

        .mode-hint {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #a3968e;
        }
    </style>
</head>
<body>

<div class="container" id="dropZone">
    <h1>Color Magic 專業去背</h1>
    <p class="subtitle">即時容差調整、背景檢驗與反向還原，為您呈現完美無瑕的影像。</p>

    <div class="toolbar">
        <div class="tool-group">
            <label for="imageLoader" class="btn-upload">📁 圖片</label>
            <input type="file" id="imageLoader" accept="image/*">
        </div>

        <div class="tool-group">
            <button id="btnPicker" class="active">🪄 吸管</button>
            <input type="text" id="hexInput" placeholder="#FFFFFF">
            <label>容差: <span id="toleranceValue">30</span></label>
            <input type="range" id="tolerance" min="0" max="150" value="30">
        </div>

        <div class="tool-group">
            <button id="btnEraser">🧽 抹除</button>
            <button id="btnRestore">✨ 還原</button>
            <label>大小: <span id="brushSizeValue">20</span></label>
            <input type="range" id="brushSize" min="5" max="150" value="20">
        </div>

        <div class="tool-group">
            <label style="font-size: 0.9rem; color: #a3968e;">背景預覽:</label>
            <button class="btn-bg active" data-bg="transparent" style="background: url('data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'20\' height=\'20\'><rect width=\'10\' height=\'10\' fill=\'%23eee\'/><rect x=\'10\' y=\'10\' width=\'10\' height=\'10\' fill=\'%23eee\'/></svg>') repeat;"></button>
            <button class="btn-bg" data-bg="#000000" style="background-color: #000000;" title="深色背景 (檢查淺色殘邊)"></button>
            <button class="btn-bg" data-bg="#ffffff" style="background-color: #ffffff;" title="淺色背景 (檢查深色殘邊)"></button>
            <input type="color" id="customBgColor" value="#d1bfae" title="自訂預覽顏色">
        </div>

        <div class="tool-group">
            <button id="btnUndo" disabled>↩️ 復原</button>
            <button id="btnDownload" class="btn-download" disabled>📥 下載 PNG</button>
        </div>
    </div>

    <div class="canvas-wrapper bg-transparent" id="canvasWrapper">
        <div id="empty-state">請點擊上方按鈕或將圖片拖曳至此處</div>
        <div id="brushCursor"></div>
        <canvas id="canvas"></canvas>
    </div>
    <div class="mode-hint" id="modeHint">
        目前模式：吸管點選（請在圖片上點擊欲去除的顏色，並可隨時拉動容差滑桿調整）
    </div>
</div>

<script>
    const dropZone = document.getElementById('dropZone');
    const imageLoader = document.getElementById('imageLoader');
    const canvasWrapper = document.getElementById('canvasWrapper');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const brushCursor = document.getElementById('brushCursor');
    
    const btnPicker = document.getElementById('btnPicker');
    const btnEraser = document.getElementById('btnEraser');
    const btnRestore = document.getElementById('btnRestore');
    const hexInput = document.getElementById('hexInput');
    const toleranceSlider = document.getElementById('tolerance');
    const brushSizeSlider = document.getElementById('brushSize');
    const btnUndo = document.getElementById('btnUndo');
    const btnDownload = document.getElementById('btnDownload');
    const modeHint = document.getElementById('modeHint');
    const bgButtons = document.querySelectorAll('.btn-bg');
    const customBgColor = document.getElementById('customBgColor');

    let currentMode = 'picker';
    let isDrawing = false;
    let lastPos = { x: 0, y: 0 };
    
    // 歷史紀錄相關變數
    let historyStack = [];
    // 儲存「當下這一步操作前」的畫面快取，確保滑桿來回拉動時，能以此快取為基礎計算
    let activeBaseData = null; 

    // 保留最原始載入的照片，供還原筆刷使用
    const originalCanvas = document.createElement('canvas');
    const originalCtx = originalCanvas.getContext('2d');

    // ==========================================
    // 0. 背景預覽切換
    // ==========================================
    function setPreviewBackground(color, isTransparent) {
        bgButtons.forEach(btn => btn.classList.remove('active'));
        if (isTransparent) {
            canvasWrapper.className = 'canvas-wrapper bg-transparent';
            canvasWrapper.style.backgroundColor = '';
        } else {
            canvasWrapper.className = 'canvas-wrapper bg-solid';
            canvasWrapper.style.backgroundColor = color;
        }
    }

    bgButtons.forEach(btn => {
        btn.addEventListener('click', function() {
            this.classList.add('active');
            if (this.getAttribute('data-bg') === 'transparent') setPreviewBackground('', true);
            else setPreviewBackground(this.getAttribute('data-bg'), false);
        });
    });
    customBgColor.addEventListener('input', e => setPreviewBackground(e.target.value, false));

    // ==========================================
    // 1. 圖片載入與歷史紀錄邏輯
    // ==========================================
    function loadImage(file) {
        if (!file || !file.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                document.getElementById('empty-state').style.display = 'none';
                
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                
                originalCanvas.width = img.width;
                originalCanvas.height = img.height;
                originalCtx.drawImage(img, 0, 0);
                
                historyStack = [];
                btnUndo.disabled = true;
                btnDownload.disabled = false;
                setMode('picker');
            }
            img.src = event.target.result;
        }
        reader.readAsDataURL(file);
    }

    imageLoader.addEventListener('change', (e) => loadImage(e.target.files[0]));
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); });
    dropZone.addEventListener('drop', (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); loadImage(e.dataTransfer.files[0]); });

    // 核心重構：儲存當下畫面進入歷史紀錄
    function saveStateToHistory() {
        if (canvas.width === 0) return;
        const currentData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        historyStack.push(currentData);
        if (historyStack.length > 20) historyStack.shift();
        btnUndo.disabled = historyStack.length === 0;
    }

    btnUndo.addEventListener('click', () => {
        if (historyStack.length > 0) {
            const previousState = historyStack.pop();
            ctx.putImageData(previousState, 0, 0);
            activeBaseData = previousState; // 將回退的畫面設為基礎快取
            btnUndo.disabled = historyStack.length === 0;
        }
    });

    // ==========================================
    // 2. 模式切換管理
    // ==========================================
    function setMode(mode) {
        currentMode = mode;
        btnPicker.classList.remove('active');
        btnEraser.classList.remove('active');
        btnRestore.classList.remove('active');
        brushCursor.style.display = 'none';
        
        if (mode === 'picker') {
            btnPicker.classList.add('active');
            canvasWrapper.style.cursor = 'crosshair';
            modeHint.textContent = '目前模式：吸管點選（請在圖片上點擊欲去除的顏色，並可隨時拉動容差滑桿調整）';
        } else if (mode === 'eraser') {
            btnEraser.classList.add('active');
            canvasWrapper.style.cursor = 'none';
            brushCursor.classList.remove('mode-restore');
            modeHint.textContent = '目前模式：抹除（按住左鍵塗抹，可手動擦除背景）';
        } else if (mode === 'restore') {
            btnRestore.classList.add('active');
            canvasWrapper.style.cursor = 'none';
            brushCursor.classList.add('mode-restore');
            modeHint.textContent = '目前模式：還原（按住左鍵塗抹，可將去背區域恢復為原圖）';
        }
    }

    btnPicker.addEventListener('click', () => setMode('picker'));
    btnEraser.addEventListener('click', () => setMode('eraser'));
    btnRestore.addEventListener('click', () => setMode('restore'));

    // ==========================================
    // 3. 吸管去背運算邏輯 (帶入基礎快取)
    // ==========================================
    function hexToRgb(hex) {
        const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return result ? [parseInt(result[1], 16), parseInt(result[2], 16), parseInt(result[3], 16)] : null;
    }

    // 將 sourceData 獨立出來，確保運算不會疊加失真
    function removeColor(targetColor, tolerance, sourceData) {
        if (!sourceData) return;
        const currentImageData = new ImageData(new Uint8ClampedArray(sourceData.data), canvas.width, canvas.height);
        const data = currentImageData.data;

        for (let i = 0; i < data.length; i += 4) {
            if(data[i+3] === 0) continue; 
            const distance = Math.sqrt(
                Math.pow(data[i] - targetColor[0], 2) + 
                Math.pow(data[i+1] - targetColor[1], 2) + 
                Math.pow(data[i+2] - targetColor[2], 2)
            );
            if (distance <= tolerance) data[i + 3] = 0;
        }
        ctx.putImageData(currentImageData, 0, 0);
    }

    // ==========================================
    // 4. 動態互動與即時容差調整
    // ==========================================
    
    // 即時容差滑桿：當顏色代碼不變時，隨時拉動即時反應
    toleranceSlider.addEventListener('input', (e) => {
        document.getElementById('toleranceValue').textContent = e.target.value;
        if (currentMode === 'picker' && activeBaseData) {
            const rgb = hexToRgb(hexInput.value);
            if (rgb) {
                // 這裡最關鍵：我們將去背演算法套用在「吸管點下那瞬間的快取」上，而非被破壞後的畫布
                removeColor(rgb, parseInt(e.target.value), activeBaseData);
            }
        }
    });

    hexInput.addEventListener('change', (e) => {
        let hex = e.target.value.trim();
        if(!hex.startsWith('#')) hex = '#' + hex;
        const rgb = hexToRgb(hex);
        if (rgb) {
            setMode('picker');
            saveStateToHistory(); // 確保開始新動作前先存檔
            activeBaseData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            removeColor(rgb, parseInt(toleranceSlider.value), activeBaseData);
        }
    });

    // 畫布點擊與塗抹處理
    canvasWrapper.addEventListener('mousedown', function(e) {
        if (canvas.width === 0) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const pos = { x: (e.clientX - rect.left) * scaleX, y: (e.clientY - rect.top) * scaleY };

        if (currentMode === 'picker') {
            // 每次點下吸管，代表確認了上一個步驟。先存入歷史，並抓取當下畫面作為新的快取
            saveStateToHistory();
            activeBaseData = ctx.getImageData(0, 0, canvas.width, canvas.height);

            const pixelIndex = (Math.floor(pos.y) * canvas.width + Math.floor(pos.x)) * 4;
            const targetColor = [
                activeBaseData.data[pixelIndex], 
                activeBaseData.data[pixelIndex+1], 
                activeBaseData.data[pixelIndex+2]
            ];
            
            hexInput.value = "#" + targetColor.map(x => x.toString(16).padStart(2, '0')).join('').toUpperCase();
            
            removeColor(targetColor, parseInt(toleranceSlider.value), activeBaseData);
        } else {
            saveStateToHistory(); // 開始塗抹前存檔
            activeBaseData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            isDrawing = true;
            lastPos = pos;
            applyBrush(pos); 
        }
    });

    // 筆刷塗抹邏輯
    function applyBrush(currPos) {
        const size = parseInt(brushSizeSlider.value);
        if (currentMode === 'eraser') {
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.moveTo(lastPos.x, lastPos.y);
            ctx.lineTo(currPos.x, currPos.y);
            ctx.lineWidth = size;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.stroke();
        } 
        else if (currentMode === 'restore') {
            ctx.globalCompositeOperation = 'source-over';
            const dist = Math.hypot(currPos.x - lastPos.x, currPos.y - lastPos.y);
            const steps = Math.max(1, Math.ceil(dist / (size / 4))); 
            
            for(let i = 0; i <= steps; i++) {
                const t = i / steps;
                const x = lastPos.x + (currPos.x - lastPos.x) * t;
                const y = lastPos.y + (currPos.y - lastPos.y) * t;
                
                ctx.save();
                ctx.beginPath();
                ctx.arc(x, y, size / 2, 0, Math.PI * 2);
                ctx.clip(); 
                ctx.drawImage(originalCanvas, 0, 0); 
                ctx.restore();
            }
        }
        lastPos = currPos;
    }

    canvasWrapper.addEventListener('mousemove', function(e) {
        if (!e) return;
        const rect = canvas.getBoundingClientRect();
        
        // 處理動態筆刷游標預覽
        if (currentMode !== 'picker' && e.clientX >= rect.left && e.clientX <= rect.right && e.clientY >= rect.top && e.clientY <= rect.bottom) {
            brushCursor.style.display = 'block';
            const visualSize = parseInt(brushSizeSlider.value) * (rect.width / canvas.width);
            brushCursor.style.width = `${visualSize}px`;
            brushCursor.style.height = `${visualSize}px`;
            brushCursor.style.left = `${e.clientX - rect.left}px`;
            brushCursor.style.top = `${e.clientY - rect.top}px`;
        } else {
            brushCursor.style.display = 'none';
        }

        // 處理拖曳塗抹
        if (!isDrawing) return;
        applyBrush({
            x: (e.clientX - rect.left) * (canvas.width / rect.width),
            y: (e.clientY - rect.top) * (canvas.height / rect.height)
        });
    });

    window.addEventListener('mouseup', function() {
        if (isDrawing) {
            isDrawing = false;
            ctx.globalCompositeOperation = 'source-over';
        }
    });

    canvasWrapper.addEventListener('mouseleave', () => { brushCursor.style.display = 'none'; });
    brushSizeSlider.addEventListener('input', (e) => { document.getElementById('brushSizeValue').textContent = e.target.value; });

    // ==========================================
    // 5. 輸出下載
    // ==========================================
    btnDownload.addEventListener('click', () => {
        if (canvas.width === 0) return;
        const link = document.createElement('a');
        link.download = 'story_perfect_transparent.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    });

</script>

</body>
</html>
